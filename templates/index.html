<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXUS COMMAND CENTER v2.0</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary-neon: #00f3ff; /* Cyan Cyberpunk */
        --alert-red: #ff2a2a; /* Merah Bahaya */
        --warning-orange: #ffae00; /* Orange Warning */
        --bg-dark: #05070a; /* Hitam Pekat */
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text-white: #ffffff;
        --text-dim: #8b9bb4;
      }

      body {
        background-color: var(--bg-dark);
        background-image: radial-gradient(
            circle at 15% 50%,
            rgba(0, 243, 255, 0.08) 0%,
            transparent 25%
          ),
          radial-gradient(
            circle at 85% 30%,
            rgba(255, 42, 42, 0.05) 0%,
            transparent 25%
          );
        color: var(--text-white);
        font-family: "Rajdhani", sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* --- TYPOGRAPHY --- */
      h1,
      h2,
      h3,
      h4,
      h5 {
        font-family: "Orbitron", sans-serif;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .main-title {
        color: var(--text-white);
        text-shadow: 0 0 20px rgba(0, 243, 255, 0.6);
        font-weight: 900;
        margin-bottom: 30px;
        border-bottom: 2px solid var(--primary-neon);
        display: inline-block;
        padding-bottom: 10px;
      }

      /* --- GLASS CARDS --- */
      .hud-card {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        padding: 20px;
        margin-bottom: 20px;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .hud-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 4px;
        height: 100%;
        background: var(--primary-neon);
        opacity: 0.5;
      }

      .hud-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 40px 0 rgba(0, 243, 255, 0.1);
        border-color: rgba(0, 243, 255, 0.3);
      }

      /* --- SENSOR VALUES --- */
      .sensor-label {
        color: var(--text-dim);
        font-size: 1.1rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 5px;
      }

      .sensor-value {
        font-family: "Orbitron", sans-serif;
        font-size: 3.5rem;
        font-weight: 700;
        color: var(--text-white); /* Putih Jelas */
        text-shadow: 0 0 15px rgba(255, 255, 255, 0.3); /* Glow Putih Dikit */
        line-height: 1.2;
      }

      .unit {
        font-size: 1.5rem;
        color: var(--primary-neon);
      }

      /* --- VIDEO FEED --- */
      .video-wrapper {
        position: relative;
        border: 2px solid var(--primary-neon);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 0 30px rgba(0, 243, 255, 0.15);
        background: #000;
      }

      .video-feed {
        width: 100%;
        display: block;
      }

      /* Sudut-sudut Cyberpunk di Video */
      .corner-decor {
        position: absolute;
        width: 20px;
        height: 20px;
        border: 3px solid var(--primary-neon);
        z-index: 10;
      }
      .tl {
        top: 10px;
        left: 10px;
        border-right: none;
        border-bottom: none;
      }
      .tr {
        top: 10px;
        right: 10px;
        border-left: none;
        border-bottom: none;
      }
      .bl {
        bottom: 10px;
        left: 10px;
        border-right: none;
        border-top: none;
      }
      .br {
        bottom: 10px;
        right: 10px;
        border-left: none;
        border-top: none;
      }

      .live-indicator {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.7);
        padding: 5px 15px;
        border-radius: 20px;
        color: var(--alert-red);
        font-weight: bold;
        border: 1px solid var(--alert-red);
        display: flex;
        align-items: center;
        gap: 8px;
        z-index: 20;
      }

      .dot {
        width: 10px;
        height: 10px;
        background-color: var(--alert-red);
        border-radius: 50%;
        animation: blink 1.5s infinite;
      }

      /* --- BUTTON --- */
      .btn-cyber {
        background: transparent;
        border: 1px solid var(--primary-neon);
        color: var(--primary-neon);
        font-family: "Orbitron", sans-serif;
        text-transform: uppercase;
        letter-spacing: 2px;
        padding: 15px;
        transition: all 0.3s;
        position: relative;
        overflow: hidden;
        z-index: 1;
      }

      .btn-cyber::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 0%;
        background: var(--primary-neon);
        transition: all 0.3s;
        z-index: -1;
      }

      .btn-cyber:hover {
        color: #000;
        box-shadow: 0 0 20px var(--primary-neon);
      }

      .btn-cyber:hover::after {
        height: 100%;
      }

      /* --- ALERTS --- */
      .alert-box {
        background: rgba(22, 27, 34, 0.9);
        border: 1px solid var(--primary-neon);
        color: var(--primary-neon);
        padding: 20px;
        border-radius: 12px;
        text-align: center;
        font-size: 1.5rem;
        font-weight: bold;
        letter-spacing: 2px;
        margin-top: 20px;
        transition: all 0.3s ease;
      }

      .alert-danger-mode {
        background: rgba(50, 0, 0, 0.8);
        border-color: var(--alert-red);
        color: var(--alert-red);
        animation: pulseAlert 1s infinite alternate;
        box-shadow: 0 0 30px rgba(255, 42, 42, 0.3);
      }

      /* --- ANIMATIONS --- */
      @keyframes blink {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
        100% {
          opacity: 1;
        }
      }
      @keyframes pulseAlert {
        from {
          transform: scale(1);
        }
        to {
          transform: scale(1.02);
        }
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="text-center">
        <h1 class="main-title">
          <i class="fas fa-shield-alt"></i> NEXUS SECURITY MONITOR
        </h1>
      </div>

      <div class="row g-4">
        <div class="col-lg-8">
          <div class="video-wrapper">
            <div class="corner-decor tl"></div>
            <div class="corner-decor tr"></div>
            <div class="corner-decor bl"></div>
            <div class="corner-decor br"></div>

            <div class="live-indicator">
              <div class="dot"></div>
              LIVE FEED
            </div>

            <img
              src="{{ url_for('video_feed') }}"
              class="video-feed"
              alt="Video Stream Offline"
            />
          </div>

          <div class="mt-3">
            <button onclick="rotateCamera()" class="btn btn-cyber w-100">
              <i class="fas fa-sync-alt fa-spin-hover"></i> ROTATE CAMERA 90°
            </button>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="hud-card">
            <div class="sensor-label">
              <i class="fas fa-temperature-high"></i> TEMPERATURE
            </div>
            <div class="d-flex justify-content-between align-items-end">
              <div class="sensor-value" id="temp">0</div>
              <div class="unit">°C</div>
            </div>
            <div
              class="progress mt-2"
              style="height: 4px; background: rgba(255, 255, 255, 0.1)"
            >
              <div
                class="progress-bar bg-info"
                role="progressbar"
                style="width: 50%"
                id="temp-bar"
              ></div>
            </div>
          </div>

          <div class="hud-card">
            <div class="sensor-label"><i class="fas fa-tint"></i> HUMIDITY</div>
            <div class="d-flex justify-content-between align-items-end">
              <div class="sensor-value" id="hum">0</div>
              <div class="unit">%</div>
            </div>
            <div
              class="progress mt-2"
              style="height: 4px; background: rgba(255, 255, 255, 0.1)"
            >
              <div
                class="progress-bar bg-primary"
                role="progressbar"
                style="width: 50%"
                id="hum-bar"
              ></div>
            </div>
          </div>

          <div class="hud-card">
            <div class="sensor-label">
              <i class="fas fa-lightbulb"></i> AMBIENT LIGHT
            </div>
            <div
              style="font-size: 1.5rem; font-weight: bold; color: white"
              id="ldr"
            >
              Analyzing...
            </div>
            <div
              style="font-size: 0.9rem; color: var(--text-dim); margin-top: 5px"
              id="ldr-raw"
            >
              Raw Value: 0
            </div>
          </div>

          <div id="alert-box" class="alert-box">
            <i class="fas fa-check-circle"></i> SYSTEM SECURE
          </div>
        </div>
      </div>
    </div>

    <script>
      var socket = io();

      function rotateCamera() {
        socket.emit("rotate_command");
      }

      socket.on("update_sensor", function (data) {
        // Update Nilai (Teks Putih)
        document.getElementById("temp").innerText = data.suhu;
        document.getElementById("hum").innerText = data.lembab;

        // Update Progress Bar (Visualisasi)
        // Asumsi suhu max 50C, lembab max 100%
        let tempPercent = (data.suhu / 50) * 100;
        document.getElementById("temp-bar").style.width = tempPercent + "%";
        document.getElementById("hum-bar").style.width = data.lembab + "%";

        // Logic LDR
        let lightStatus = data.cahaya == 1 ? "☀️ DAYLIGHT" : "🌑 NIGHT MODE";
        let colorLight = data.cahaya == 1 ? "#ffae00" : "#8b9bb4"; // Kuning atau Abu

        let ldrElem = document.getElementById("ldr");
        ldrElem.innerText = lightStatus;
        ldrElem.style.color = colorLight;

        document.getElementById("ldr-raw").innerText =
          "Sensor Raw: " + data.ldr_raw;

        // Logic Alert Box
        let alertBox = document.getElementById("alert-box");

        if (data.gerak == 1) {
          alertBox.className = "alert-box alert-danger-mode";
          alertBox.innerHTML =
            '<i class="fas fa-exclamation-triangle"></i> MOTION DETECTED';
        } else {
          alertBox.className = "alert-box";
          alertBox.style.borderColor = "var(--primary-neon)";
          alertBox.style.color = "var(--primary-neon)";
          alertBox.style.background = "rgba(22, 27, 34, 0.9)";
          alertBox.style.boxShadow = "none";
          alertBox.innerHTML =
            '<i class="fas fa-check-circle"></i> SYSTEM SECURE';
        }
      });
    </script>
  </body>
</html>
